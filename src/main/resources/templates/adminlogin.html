<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | EasyShip Courier</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:url("/images/warehouse.png") center center/cover no-repeat;

overflow:hidden;

}

.overlay{

position:fixed;

inset:0;

background:rgba(0,0,0,.68);

backdrop-filter:blur(2px);

}

.admin-card{

position:relative;

z-index:2;

width:470px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,.40);

color:#fff;

animation:fadeIn .8s ease;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

width:90px;

display:block;

margin:auto;

margin-bottom:20px;

}

.admin-icon{

width:80px;

height:80px;

border-radius:50%;

background:rgba(227,24,55,.18);

display:flex;

justify-content:center;

align-items:center;

margin:0 auto 20px;

border:2px solid rgba(255,255,255,.25);

}

.admin-icon i{

font-size:38px;

color:#fff;

}

h2{

text-align:center;

font-weight:700;

margin-bottom:8px;

}

.subtitle{

text-align:center;

font-size:14px;

color:#f1f1f1;

margin-bottom:25px;

}

.form-control{

height:52px;

border:none;

border-radius:12px;

padding-left:15px;

}

.form-control:focus{

box-shadow:0 0 10px rgba(227,24,55,.55);

}

.btn-danger{

height:52px;

border:none;

border-radius:12px;

font-weight:600;

background:#e31837;

transition:.3s;

}

.btn-danger:hover{

background:#c81531;

transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="admin-card">

<img th:src="@{/images/logo.png}" class="logo">

<div class="admin-icon">

<i class="bi bi-shield-lock-fill"></i>

</div>

<h2>

Administrator Login

</h2>

<p class="subtitle">

Authorized Personnel Only

</p>
<form th:action="@{/adminlogin}" method="post">

<div class="mb-3">

<label class="mb-2">

<i class="bi bi-envelope-fill"></i>

Admin Email

</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Admin Email"
required>

</div>

<div class="mb-3">

<label class="mb-2">

<i class="bi bi-lock-fill"></i>

Password

</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<div th:if="${error}"
class="alert alert-danger text-center py-2">

<i class="bi bi-exclamation-triangle-fill"></i>

<span th:text="${error}">

Invalid Email or Password

</span>

</div>

<button
type="submit"
class="btn btn-danger w-100">

<i class="bi bi-box-arrow-in-right"></i>

Login as Admin

</button>

</form>
<hr class="border-light my-4">

<div class="text-center">

    <p class="text-light mb-3">

        Return to Customer Portal

    </p>

    <a th:href="@{/login}"
       class="btn btn-outline-light w-100 mb-3">

        <i class="bi bi-person-circle"></i>

        Customer Login

    </a>

    <a th:href="@{/}"
       class="btn btn-outline-warning w-100">

        <i class="bi bi-house-door-fill"></i>

        Back to Home

    </a>

</div>

<div class="text-center mt-4">

    <small class="text-light">

        <i class="bi bi-shield-check"></i>

        Secure Administrator Access

    </small>

</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const email = document.querySelector("input[name='email']");
    const password = document.querySelector("input[name='password']");

    if (email) {
        email.focus();
    }

    document.addEventListener("keydown", function (e) {

        if (e.key === "Enter") {

            if (document.activeElement === email) {

                password.focus();

                e.preventDefault();

            }

        }

    });

});

</script>

</body>

</html>
