<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Parcel | EasyShip Courier</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fa;
}

.navbar{
background:#111827;
}

.navbar-brand{
font-size:26px;
font-weight:700;
color:#fff !important;
}

.hero{

background:url("/images/truck.png") center center/cover no-repeat;

height:220px;

position:relative;

display:flex;

align-items:center;

justify-content:center;

}

.hero::before{

content:"";

position:absolute;

inset:0;

background:rgba(0,0,0,.60);

}

.hero-content{

position:relative;

z-index:2;

color:white;

text-align:center;

}

.form-box{

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,.10);

margin-top:-60px;

position:relative;

z-index:5;

}

.btn-danger{

border-radius:30px;

padding:12px;

font-weight:600;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" th:href="@{/dashboard}">
EasyShip Courier
</a>

<div>

<a th:href="@{/dashboard}" class="btn btn-light me-2">
Dashboard
</a>

<a th:href="@{/logout}" class="btn btn-danger">
Logout
</a>

</div>

</div>

</nav>

<section class="hero">

<div class="hero-content">

<h1>Book Your Parcel</h1>

<p>Fast • Secure • Reliable</p>

</div>

</section>

<div class="container mb-5">

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="form-box">

<form th:action="@{/saveparcel}" method="post">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Sender Name</label>

<input
type="text"
name="senderName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Sender Mobile</label>

<input
type="text"
name="senderMobile"
class="form-control"
required>

</div>

<div class="col-12 mb-3">

<label class="form-label">Sender Address</label>

<textarea
name="senderAddress"
class="form-control"
rows="2"
required></textarea>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Receiver Name</label>

<input
type="text"
name="receiverName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Receiver Mobile</label>

<input
type="text"
name="receiverMobile"
class="form-control"
required>

</div>

<div class="col-12 mb-3">

<label class="form-label">Receiver Address</label>

<textarea
name="receiverAddress"
class="form-control"
rows="2"
required></textarea>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Parcel Weight (KG)</label>

<input
type="number"
step="0.1"
name="weight"
class="form-control"
required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">Parcel Type</label>

<select
name="parcelType"
class="form-select">

<option>Document</option>
<option>Box</option>
<option>Electronics</option>
<option>Fragile</option>
<option>Clothes</option>

</select>

</div>

<div class="col-12">

<button
class="btn btn-danger w-100">

<i class="bi bi-box-seam"></i>

Book Parcel

</button>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
