<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | EasyShip Courier</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#f5f7fa;

}

.navbar{

background:#111827;

}

.navbar-brand{

font-size:26px;

font-weight:700;

color:#fff !important;

}

.hero{

background:url("/images/warehouse.png") center center/cover no-repeat;

height:300px;

position:relative;

display:flex;

align-items:center;

justify-content:center;

}

.hero::before{

content:"";

position:absolute;

inset:0;

background:rgba(0,0,0,.60);

}

.hero-content{

position:relative;

z-index:2;

color:#fff;

text-align:center;

}

.card-box{

background:#fff;

border-radius:20px;

padding:35px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.10);

transition:.4s;

height:100%;

}

.card-box:hover{

transform:translateY(-8px);

}

.card-box i{

font-size:50px;

color:#e31837;

margin-bottom:20px;

}

.btn-danger{

border-radius:30px;

padding:10px 25px;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="#">EasyShip Courier</a>

<div>

<a th:href="@{/}" class="btn btn-light me-2">

Home

</a>

<a th:href="@{/logout}" class="btn btn-danger">

Logout

</a>

</div>

</div>

</nav>

<section class="hero">

<div class="hero-content">

<h1>
    Welcome,
    <span th:text="${user.fullname}"></span>
</h1>

<p>Manage your courier services easily.</p>

</div>

</section>

<div class="container my-5">

<div class="row g-4">

<div class="col-md-4">

<div class="card-box">

<i class="bi bi-box-seam"></i>

<h4 class="mt-3">Book Parcel</h4>
<p>Create a new shipment quickly.</p>

<a th:href="@{/bookparcel}" class="btn btn-danger">
    Book Now
</a>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<i class="bi bi-search"></i>

<h4>Track Parcel</h4>

<p>Track your shipment in real time.</p>

<a th:href="@{/track}" class="btn btn-danger">
    Track
</a>

</div>

</div>

<div class="col-md-4">

<div class="card-box">

<i class="bi bi-clock-history"></i>

<h4>My Orders</h4>

<p>View all your booked parcels.</p>

<a th:href="@{/myorders}" class="btn btn-danger">
    View
</a>
</div>

</div>

</div>

</div>

</body>

</html>
